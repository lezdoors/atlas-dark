<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Poufs — Atlas Perle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Serif:ital,wght@1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.cat-hero{position:relative;min-height:70vh;overflow:hidden;background:var(--ink);display:flex;align-items:flex-end;padding:140px 48px 60px}
.cat-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.55;filter:saturate(.8) brightness(.7)}
.cat-hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(10,8,7,.4) 0%, rgba(10,8,7,.94) 100%)}
.cat-hero .inner{position:relative;z-index:2;max-width:1440px;margin:0 auto;width:100%;display:grid;grid-template-columns:1.4fr 1fr;gap:48px;align-items:end}
.cat-hero h1{font-family:var(--f-serif);font-weight:300;font-size:clamp(56px,9vw,160px);line-height:.92;letter-spacing:-.02em;color:var(--bone);max-width:18ch}
.cat-hero h1 em{font-style:italic;color:var(--brass)}
.cat-hero .sub{font-family:var(--f-serif);font-style:italic;font-size:21px;color:var(--parchment);line-height:1.55}
.cat-hero .stats{display:grid;grid-template-columns:1fr 1fr;gap:0;padding-top:18px;margin-top:18px;border-top:1px solid var(--line-brass)}
.cat-hero .stats .s{padding:6px 18px 6px 0;border-right:1px solid var(--line-soft)}
.cat-hero .stats .s:last-child{border-right:0;padding-left:18px;padding-right:0}
.cat-hero .stats .k{font-family:var(--f-mono);font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--brass)}
.cat-hero .stats .v{font-family:var(--f-serif);font-style:italic;font-size:18px;color:var(--bone);margin-top:4px}
@media(max-width:900px){.cat-hero{padding:120px 20px 40px}.cat-hero .inner{grid-template-columns:1fr;gap:24px}}
.fam-bar{position:sticky;top:62px;z-index:50;background:rgba(10,8,7,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 48px}
.fam-bar .inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.fam-bar .lbl{font-family:var(--f-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim);margin-right:6px}
.fam-bar button{font-family:var(--f-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;padding:8px 14px;border:1px solid var(--line);color:var(--oyster);transition:all .3s var(--ease)}
.fam-bar button:hover{color:var(--brass);border-color:var(--line-brass)}
.fam-bar button.on{background:var(--brass);color:var(--ink);border-color:var(--brass)}
.fam-bar .count{margin-left:auto;font-family:var(--f-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--brass)}
@media(max-width:900px){.fam-bar{padding:12px 20px;top:54px}.fam-bar .count{width:100%;margin-left:0;margin-top:6px}}
.fam-grid{padding:60px 48px 80px;background:var(--ink)}
.fam-grid .inner{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:32px 24px}
@media(max-width:1100px){.fam-grid .inner{grid-template-columns:repeat(3,1fr)}}
@media(max-width:780px){.fam-grid{padding:40px 20px 60px}.fam-grid .inner{grid-template-columns:repeat(2,1fr)}}
@media(max-width:420px){.fam-grid .inner{grid-template-columns:1fr}}
.pcard{display:block;color:inherit;position:relative;transition:transform .4s var(--ease)}
.pcard:hover{transform:translateY(-4px)}
.pcard .media{position:relative;aspect-ratio:4/5;background:var(--espresso);border:1px solid var(--line);overflow:hidden;margin-bottom:14px}
.pcard .media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .5s var(--ease),transform .8s var(--ease)}
.pcard .media .alt{opacity:0}
.pcard:hover .media .alt{opacity:1}
.pcard:hover .media img{transform:scale(1.04)}
.pcard .media .fam{position:absolute;top:12px;left:12px;z-index:2;font-family:var(--f-mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--brass);background:rgba(10,8,7,.6);padding:4px 8px;backdrop-filter:blur(4px)}
.pcard .name{font-family:var(--f-serif);font-size:19px;font-weight:300;color:var(--bone);line-height:1.25}
.pcard .name em{font-style:italic;color:var(--brass-hi)}
.pcard .price{font-family:var(--f-mono);font-size:11px;letter-spacing:.18em;color:var(--oyster);margin-top:4px}
.fams{padding:80px 48px;background:var(--night);border-top:1px solid var(--line)}
.fams .inner{max-width:1440px;margin:0 auto}
.fams h2{font-family:var(--f-serif);font-weight:300;font-size:clamp(32px,4vw,52px);color:var(--bone);margin-bottom:36px;letter-spacing:-.012em}
.fams h2 em{font-style:italic;color:var(--brass)}
.fams .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.fams .card{position:relative;aspect-ratio:5/6;overflow:hidden;border:1px solid var(--line);background:var(--espresso);padding:24px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--bone);transition:transform .4s var(--ease)}
.fams .card:hover{transform:translateY(-4px)}
.fams .card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.55;filter:saturate(.85) brightness(.85);transition:opacity .4s,transform .8s var(--ease)}
.fams .card:hover img{opacity:.7;transform:scale(1.04)}
.fams .card::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(15,12,10,.15) 0%, rgba(15,12,10,.92) 100%)}
.fams .card .body{position:relative;z-index:2}
.fams .card .k{font-family:var(--f-mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--brass);margin-bottom:8px}
.fams .card .n{font-family:var(--f-serif);font-style:italic;font-size:32px;color:var(--bone);font-weight:300;line-height:1}
.fams .card .d{font-family:var(--f-serif);font-size:14px;line-height:1.5;color:var(--parchment);margin-top:10px;font-weight:300}
.fams .card .cnt{font-family:var(--f-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--oyster);margin-top:14px}
@media(max-width:900px){.fams{padding:60px 20px}.fams .grid{grid-template-columns:1fr 1fr;gap:12px}}
.empty{padding:80px 0;text-align:center;font-family:var(--f-serif);font-style:italic;font-size:22px;color:var(--dim);grid-column:1/-1}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="/products.js"></script>
<script type="text/babel" data-presets="react" src="/shared.js"></script>

<script type="text/babel" data-presets="react">
const FAMILIES = {
  hachkar: {label:"Akal", k:"akal-pouf", lede:"Embroidered & deluxe poufs in deep black or saddle brown — beni-style, knot-tied at the seam.", img:"/media/products/hachkar-deluxe-brown-01.webp"},
  "kilim-pouf": {label:"Kilim", k:"kilim", lede:"Vintage kilim cushioned over a leather base — each piece one of one, woven before it was cut.", img:"/media/products/kilim-pouf-orange-blue-01.webp"},
  "leather-pouf": {label:"Leather", k:"leather", lede:"Veg-tanned hide from Tannery Chouara, hand-stitched with waxed linen. Five colourways, made to age.", img:"/media/products/leather-pouf-brown-01.webp"},
  "sabra-pouf": {label:"Sabra", k:"sabra", lede:"Cactus-silk woven in the Atlas, dyed with plant pigments — the textile catches light like brass.", img:"/media/products/sabra-pouf-mustard-01.webp"},
};

function familyOf(slug) {
  if (slug.startsWith("hachkar")) return "hachkar";
  if (slug.startsWith("kilim-pouf")) return "kilim-pouf";
  if (slug.startsWith("leather-pouf")) return "leather-pouf";
  if (slug.startsWith("sabra-pouf")) return "sabra-pouf";
  return null;
}

function App() {
  const t = useT();
  const all = (window.PRODUCTS || []).filter(p => familyOf(p.slug) !== null);
  const [active, setActive] = useState("all");
  const list = active === "all" ? all : all.filter(p => familyOf(p.slug) === active);
  const tabs = [["all","All"],["hachkar","Akal"],["kilim-pouf","Kilim"],["leather-pouf","Leather"],["sabra-pouf","Sabra"]];
  return (
    <LangProvider>
      <Nav />
      <section className="cat-hero">
        <img src="/media/products/leather-pouf-brown-01.webp" alt=""/>
        <div className="inner">
          <Reveal speed="reveal-slow">
            <div className="eyebrow" style={{marginBottom:24}}>— Discipline · Seating</div>
            <WordReveal as="h1" text="Poufs, drawn from <em>four houses.</em>" perWord={100}/>
          </Reveal>
          <Reveal className="sub" delay={250}>
            Akal, Kilim, Leather, Sabra — four families, four conversations with the medina. Hand-stitched at the bench, each piece signed and dated.
            <div className="stats">
              <div className="s"><div className="k">In catalogue</div><div className="v">{all.length} poufs</div></div>
              <div className="s"><div className="k">Lead time</div><div className="v">9 days · one pair of hands</div></div>
            </div>
          </Reveal>
        </div>
      </section>

      <section className="fams">
        <div className="inner">
          <Reveal>
            <h2>The four <em>families.</em></h2>
          </Reveal>
          <div className="grid">
            {Object.entries(FAMILIES).map(([key, f], i) => {
              const count = all.filter(p => familyOf(p.slug) === key).length;
              return (
                <Reveal as="a" className="card" key={key} delay={i*80} href={`#fam-${key}`} onClick={(e)=>{e.preventDefault();setActive(key);window.scrollTo({top:document.querySelector(".fam-bar").offsetTop-50,behavior:"smooth"})}}>
                  <img src={f.img} alt=""/>
                  <div className="body">
                    <div className="k">{f.k}</div>
                    <div className="n">{f.label}</div>
                    <div className="d">{f.lede}</div>
                    <div className="cnt">{count} pieces</div>
                  </div>
                </Reveal>
              );
            })}
          </div>
        </div>
      </section>

      <div className="fam-bar">
        <div className="inner">
          <span className="lbl">Family —</span>
          {tabs.map(([id,label]) => (
            <button key={id} className={active===id?"on":""} onClick={()=>setActive(id)}>{label}</button>
          ))}
          <span className="count">{list.length} pieces</span>
        </div>
      </div>

      <section className="fam-grid">
        <div className="inner">
          {list.length === 0 ? <div className="empty">No poufs in this family yet.</div> :
            list.map(p => {
              const fam = familyOf(p.slug);
              const famLabel = FAMILIES[fam]?.label || "Pouf";
              const img1 = `/media/products/${p.images[0]}`;
              const img2 = p.images[1] ? `/media/products/${p.images[1]}` : img1;
              return (
                <a className="pcard" href={`/product?p=${p.slug}`} key={p.slug}>
                  <div className="media">
                    <img src={img1} alt={p.name} loading="lazy"/>
                    <img className="alt" src={img2} alt="" loading="lazy"/>
                    <div className="fam">{famLabel}</div>
                  </div>
                  <div className="name">{p.name}</div>
                  <div className="price">€ {p.price.toLocaleString()}</div>
                </a>
              );
            })
          }
        </div>
      </section>

      <Footer />
    </LangProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
