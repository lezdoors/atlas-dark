// ============ TICKER ============
function Ticker() {
  const items = ["Brass", "Bone", "Camel leather", "Atlas cedar", "Hand-pressed plaster", "Lacquer on wood", "Waxed linen", "Bronze casting", "Tannery Chouara", "Marrakech medina"];
  const stream = [...items, ...items, ...items];
  return (
    <div className="ticker">
      <div className="ticker-track">
        {stream.map((s, i) => <span className="it" key={i}>{s}</span>)}
      </div>
    </div>
  );
}

// ============ TOOLBAR ============
function Toolbar() {
  const t = useT();
  const chips = [
    ["all","tb.all"],["seat","tb.seat"],["light","tb.light"],["vess","tb.vess"],
    ["text","tb.text"],["lac","tb.lac"],["com","tb.com"]
  ];
  const [active, setActive] = useState("all");
  return (
    <div className="toolbar floating">
      <div className="inner">
        <div className="label">{t("tb.filter")}</div>
        <div className="chips">
          {chips.map(([id,key]) => (
            <button key={id} className={`chip ${active === id ? "on" : ""}`} onClick={() => setActive(id)}>{t(key)}</button>
          ))}
        </div>
        <div className="count"><em>28</em> {t("tb.pieces")} · <em>9</em> {t("tb.editionsOpen")}</div>
        <div className="sort">{t("tb.sort")} <b>{t("tb.sortV")} ↓</b></div>
      </div>
    </div>
  );
}

            </div>

// ============ COLLECTION ============
function Collection() {

    { lot:"Nº 024", name:"Kasbah", italic:"Pendant",     sub:"Light · Brass, bone",         price:"€ 2,180",  tag:"8 / 12",     ed:true,  img:"media/diyae-pendant-01.webp",    alt:"media/omniya-pendant-01.webp" },
    { lot:"Nº 031", name:"Zellige",italic:"Side tables", sub:"Table · Cedar, bone inlay",   price:"€ 2,640",  tag:"Archive",    ed:false, img:"media/moroccan-bone-inlay-side-tables-01.webp", alt:"media/moroccan-octagonal-coffee-table-03.webp" },
  ];
  return (
    <section className="collection" id="collection" data-screen-label="01 Collection">
      <div className="inner">
        <div className="head">
          <Reveal>
            <div className="eyebrow">{t("col.eyebrow")}</div>
            <WordReveal as="h2" text={t("col.headline")} perWord={90}/>
          </Reveal>
          <Reveal className="cta" delay={200}>
            <span className="meta">{t("col.meta")}</span>
            <a className="link-u" href="/collection">{t("col.cta")}</a>
          </Reveal>
        </div>

        <div className="grid-dense">
          {cards.map((c, i) => (
            <Reveal className="card" key={c.lot} delay={i * 60}>

                    <img className="alt"     src={M(c.alt)} alt=""/>
                  </>
                ) : (
                  <Placeholder tone={c.place.tone} label={c.place.label}/>

                <div className={`tag ${c.ed ? "ed" : ""}`}>{c.tag}</div>
                <button className="quickadd">{t("card.add")} · {c.price}</button>

function Placeholder({ tone, label }) {
  const tones = {
    brass:   { bg:"radial-gradient(70% 55% at 50% 40%, #3a2a12 0%, #1a130b 75%)", glow:"radial-gradient(55% 38% at 50% 30%, rgba(232,212,154,.45), transparent 60%)", obj:"radial-gradient(60% 50% at 50% 50%, #c9a24a 0%, #8a6c2d 55%, #3a2a12 100%)" },
    bone:    { bg:"radial-gradient(70% 55% at 50% 40%, #2a2018 0%, #120d09 75%)", glow:"radial-gradient(55% 38% at 50% 30%, rgba(237,228,207,.2), transparent 60%)",  obj:"radial-gradient(60% 50% at 50% 50%, #ede4cf 0%, #b7a988 55%, #5a4f40 100%)" },
    lacquer: { bg:"radial-gradient(70% 55% at 50% 40%, #1a0a08 0%, #0a0404 75%)", glow:"radial-gradient(55% 38% at 50% 30%, rgba(201,162,74,.1), transparent 60%)",  obj:"radial-gradient(60% 50% at 50% 50%, #7a1b15 0%, #3a0e0b 55%, #170706 100%)" },
  };
  const t = tones[tone] || tones.brass;
  return (
    <div style={{position:"absolute",inset:0,background:t.bg}}>
      <div style={{position:"absolute",inset:0,background:t.glow}}/>
      <div style={{position:"absolute",left:"30%",top:"40%",width:"40%",aspectRatio:"1.4/1",background:t.obj,borderRadius:"50% 50% 42% 42% / 65% 65% 38% 38%",boxShadow:"0 40px 50px -20px rgba(0,0,0,.6)"}}/>
      <div style={{position:"absolute",left:20,bottom:16,right:20,color:"var(--oyster)",fontFamily:"var(--f-mono)",fontSize:10,letterSpacing:".22em",textTransform:"uppercase",display:"flex",justifyContent:"space-between",opacity:.75}}>
        <span>{label}</span><span>[plate forthcoming]</span>
      </div>
    </div>
  );
}

<script type="text/babel" data-presets="react">
