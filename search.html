<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Search — Atlas Perle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Serif:ital,wght@1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.search-page{padding:160px 48px 60px;background:var(--night);border-bottom:1px solid var(--line);min-height:30vh}
.search-page .inner{max-width:1100px;margin:0 auto}
.search-page h1{font-family:var(--f-serif);font-weight:300;font-size:clamp(48px,7vw,96px);line-height:.96;color:var(--bone);margin-bottom:12px;letter-spacing:-.014em}
.search-page h1 em{font-style:italic;color:var(--brass)}
.search-page .sub{font-family:var(--f-serif);font-style:italic;font-size:19px;color:var(--parchment);margin-bottom:36px}
.search-bar{display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line-brass);padding-bottom:14px}
.search-bar input{flex:1;background:transparent;border:0;color:var(--bone);font-family:var(--f-serif);font-style:italic;font-size:clamp(24px,4vw,42px);font-weight:300;outline:none}
.search-bar input::placeholder{color:var(--dim)}
.search-bar .ic{font-family:var(--f-mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--brass)}
.results{padding:60px 48px 120px;background:var(--ink)}
.results .inner{max-width:1440px;margin:0 auto}
.results .meta{font-family:var(--f-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--oyster);margin-bottom:24px}
.results .meta b{color:var(--brass)}
.results .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:32px 24px}
@media(max-width:1100px){.results .grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:780px){.search-page{padding:130px 20px 40px}.results{padding:40px 20px 80px}.results .grid{grid-template-columns:repeat(2,1fr)}}
.pcard{display:block;color:inherit;transition:transform .4s var(--ease)}
.pcard:hover{transform:translateY(-4px)}
.pcard .media{position:relative;aspect-ratio:4/5;background:var(--espresso);border:1px solid var(--line);overflow:hidden;margin-bottom:14px}
.pcard .media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pcard .name{font-family:var(--f-serif);font-size:18px;color:var(--bone);font-weight:300}
.pcard .price{font-family:var(--f-mono);font-size:11px;letter-spacing:.18em;color:var(--oyster);margin-top:4px}
.empty-results{padding:60px 0;text-align:center;font-family:var(--f-serif);font-style:italic;font-size:22px;color:var(--dim)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="/products.js"></script>
<script type="text/babel" data-presets="react" src="/shared.js"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [q, setQ] = useState("");
  const ql = q.trim().toLowerCase();
  const all = window.PRODUCTS || [];
  const results = ql.length < 2 ? [] : all.filter(p =>
    p.name.toLowerCase().includes(ql) ||
    p.slug.toLowerCase().includes(ql) ||
    p.category.toLowerCase().includes(ql)
  );
  return (
    <LangProvider>
      <Nav />
      <section className="search-page">
        <div className="inner">
          <div className="eyebrow" style={{marginBottom:24}}>— Search the catalogue</div>
          <h1>Find an <em>object.</em></h1>
          <div className="search-bar">
            <span className="ic">/</span>
            <input autoFocus placeholder="brass, bone, throne, kamar pendant…" value={q} onChange={(e)=>setQ(e.target.value)}/>
          </div>
        </div>
      </section>
      <section className="results">
        <div className="inner">
          <div className="meta">{ql.length < 2 ? "Type at least two letters" : <>Showing <b>{results.length}</b> objects matching <b>"{q}"</b></>}</div>
          {results.length > 0 ? (
            <div className="grid">
              {results.map(p => (
                <a className="pcard" href={`/product?p=${p.slug}`} key={p.slug}>
                  <div className="media"><img src={`/media/products/${p.images[0]}`} alt={p.name} loading="lazy"/></div>
                  <div className="name">{p.name}</div>
                  <div className="price">€ {p.price.toLocaleString()}</div>
                </a>
              ))}
            </div>
          ) : ql.length >= 2 ? <div className="empty-results">Nothing found in the catalogue. Try another word.</div> : null}
        </div>
      </section>
      <Footer />
    </LangProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
