<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lights — Atlas Perle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Serif:ital,wght@1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.lt-hero{position:relative;min-height:75vh;overflow:hidden;background:var(--ink);display:flex;align-items:flex-end;padding:140px 48px 60px}
.lt-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.6;filter:saturate(.95) brightness(.78)}
.lt-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(60% 50% at 50% 35%, rgba(232,212,154,.18), transparent 65%)}
.lt-hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(10,8,7,.35) 0%, rgba(10,8,7,.94) 100%)}
.lt-hero .inner{position:relative;z-index:2;max-width:1440px;margin:0 auto;width:100%;display:grid;grid-template-columns:1.4fr 1fr;gap:48px;align-items:end}
.lt-hero h1{font-family:var(--f-serif);font-weight:300;font-size:clamp(56px,9vw,160px);line-height:.92;letter-spacing:-.02em;color:var(--bone);max-width:18ch}
.lt-hero h1 em{font-style:italic;color:var(--brass)}
.lt-hero .sub{font-family:var(--f-serif);font-style:italic;font-size:21px;color:var(--parchment);line-height:1.55}
.lt-hero .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;padding-top:18px;margin-top:18px;border-top:1px solid var(--line-brass)}
.lt-hero .stats .s{padding:6px 14px 6px 0;border-right:1px solid var(--line-soft)}
.lt-hero .stats .s:last-child{border-right:0;padding-right:0}
.lt-hero .stats .s:not(:first-child){padding-left:14px}
.lt-hero .stats .k{font-family:var(--f-mono);font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--brass)}
.lt-hero .stats .v{font-family:var(--f-serif);font-style:italic;font-size:17px;color:var(--bone);margin-top:4px}
@media(max-width:900px){.lt-hero{padding:120px 20px 40px}.lt-hero .inner{grid-template-columns:1fr;gap:24px}}
.craft{padding:80px 48px;background:var(--night);border-bottom:1px solid var(--line)}
.craft .inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 2fr;gap:48px}
.craft .l{font-family:var(--f-mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--brass)}
.craft .r p{font-family:var(--f-serif);font-weight:300;font-size:21px;line-height:1.6;color:var(--bone);margin-bottom:18px}
.craft .r p em{font-style:italic;color:var(--brass-hi)}
@media(max-width:900px){.craft{padding:50px 20px}.craft .inner{grid-template-columns:1fr;gap:14px}}
.lt-grid{padding:80px 48px 100px;background:var(--ink)}
.lt-grid .inner{max-width:1440px;margin:0 auto}
.lt-grid .head{display:flex;justify-content:space-between;align-items:end;margin-bottom:36px;gap:24px}
.lt-grid h2{font-family:var(--f-serif);font-weight:300;font-size:clamp(36px,5vw,68px);line-height:1;color:var(--bone);letter-spacing:-.014em}
.lt-grid h2 em{font-style:italic;color:var(--brass)}
.lt-grid .meta{font-family:var(--f-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--oyster);text-align:right;line-height:1.6}
.lt-grid .meta b{color:var(--brass);font-weight:400}
.lt-grid .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px 24px}
@media(max-width:1100px){.lt-grid .grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.lt-grid{padding:50px 20px 80px}.lt-grid .grid{grid-template-columns:1fr}}
.pcard-l{display:block;color:inherit;position:relative;transition:transform .4s var(--ease)}
.pcard-l:hover{transform:translateY(-4px)}
.pcard-l .media{position:relative;aspect-ratio:3/4;background:var(--espresso);border:1px solid var(--line);overflow:hidden;margin-bottom:14px}
.pcard-l .media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .5s var(--ease),transform .8s var(--ease)}
.pcard-l .media .alt{opacity:0}
.pcard-l:hover .media .alt{opacity:1}
.pcard-l .media::after{content:"";position:absolute;inset:0;background:radial-gradient(50% 35% at 50% 25%, rgba(232,212,154,.16), transparent 65%);pointer-events:none;opacity:.7;transition:opacity .4s}
.pcard-l:hover .media::after{opacity:1}
.pcard-l .media .lot{position:absolute;top:14px;left:14px;z-index:2;font-family:var(--f-mono);font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--brass);background:rgba(10,8,7,.55);padding:5px 9px;backdrop-filter:blur(4px)}
.pcard-l .info{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.pcard-l .name{font-family:var(--f-serif);font-size:22px;font-weight:300;color:var(--bone);line-height:1.2}
.pcard-l .name em{font-style:italic;color:var(--brass-hi)}
.pcard-l .price{font-family:var(--f-mono);font-size:11px;letter-spacing:.18em;color:var(--oyster);white-space:nowrap}
.pcard-l .specs{margin-top:8px;font-family:var(--f-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim)}
.note-block{padding:80px 48px;background:var(--night);border-top:1px solid var(--line)}
.note-block .inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.note-block .visual{position:relative;aspect-ratio:4/5;background:var(--espresso);border:1px solid var(--line);overflow:hidden}
.note-block .visual img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(.95) brightness(.92)}
.note-block .copy h3{font-family:var(--f-serif);font-weight:300;font-size:clamp(32px,4vw,52px);color:var(--bone);line-height:1;margin-bottom:24px;letter-spacing:-.012em}
.note-block .copy h3 em{font-style:italic;color:var(--brass)}
.note-block .copy p{font-family:var(--f-serif);font-size:18px;line-height:1.7;color:var(--parchment);margin-bottom:18px;font-weight:300}
.note-block .copy p em{font-style:italic;color:var(--brass-hi)}
.note-block .copy .actions{margin-top:24px;display:flex;gap:14px;flex-wrap:wrap}
@media(max-width:900px){.note-block{padding:50px 20px}.note-block .inner{grid-template-columns:1fr;gap:24px}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="/products.js"></script>
<script type="text/babel" data-presets="react" src="/shared.js"></script>

<script type="text/babel" data-presets="react">
const PENDANT_NOTE = {
  "amani-pendant":   "Hand-perforated brass · Ø 28 cm",
  "amaya-pendant":   "Pierced & patinated · Ø 32 cm",
  "chamss-pendant":  "Geometric piercing · Ø 36 cm",
  "chorouk-pendant": "Bone-hammered shoulder · Ø 24 cm",
  "diyae-pendant":   "Bone inlay rim · Ø 30 cm",
  "kamar-pendant":   "Domed brass · Ø 26 cm",
  "manar-pendant":   "Cast brass arms · h 56 cm",
  "omniya-pendant":  "Twin-shell brass · Ø 38 cm",
  "oval-pendant":    "Cedar & brass cage · h 60 cm",
  "spindle-pendant": "Spindle silhouette · h 72 cm",
  "teardrop-pendant":"Teardrop brass · h 48 cm",
};

function App() {
  const t = useT();
  const lights = (window.PRODUCTS || []).filter(p => p.category === "light");
  return (
    <LangProvider>
      <Nav />
      <section className="lt-hero">
        <img src="/media/products/kamar-pendant-01.webp" alt=""/>
        <div className="inner">
          <Reveal speed="reveal-slow">
            <div className="eyebrow" style={{marginBottom:24}}>— Discipline · Light</div>
            <WordReveal as="h1" text="Brass, <em>perforated</em> by hand." perWord={100}/>
          </Reveal>
          <Reveal className="sub" delay={250}>
            Eleven pendants, each hammered, pierced, and patinated at Souk Haddadine — at the foot of the medina wall, where nine craftsmen still work brass against a wooden stencil.
            <div className="stats">
              <div className="s"><div className="k">Pendants</div><div className="v">{lights.length} designs</div></div>
              <div className="s"><div className="k">Material</div><div className="v">Brass · bone · cedar</div></div>
              <div className="s"><div className="k">Lead time</div><div className="v">11 days · four hands</div></div>
            </div>
          </Reveal>
        </div>
      </section>

      <section className="craft">
        <div className="inner">
          <Reveal className="l">— On the brass</Reveal>
          <Reveal className="r" delay={150}>
            <p>Sheets are hammered flat, then perforated against a wooden stencil that has been in the same family since the nineteenth century. Each light is a single piece — no solder, no plating; the joins are folded and the rivets walked round the seam by eye.</p>
            <p>The patination is finished with smoke and beeswax. The brass darkens unevenly, in proportion to the hand that struck it — <em>so a pair, however close, is never twin.</em></p>
          </Reveal>
        </div>
      </section>

      <section className="lt-grid">
        <div className="inner">
          <div className="head">
            <Reveal>
              <h2>Eleven <em>pendants.</em></h2>
            </Reveal>
            <Reveal className="meta" delay={150}>
              Catalogue IX · Spring 2026<br/>
              <b>{lights.length}</b> designs · <b>{lights.reduce((n,l)=>n+l.images.length,0)}</b> plates
            </Reveal>
          </div>
          <div className="grid">
            {lights.map((p, i) => {
              const img1 = `/media/products/${p.images[0]}`;
              const img2 = p.images[1] ? `/media/products/${p.images[1]}` : img1;
              return (
                <Reveal as="a" className="pcard-l" key={p.slug} delay={i*40} href={`/product?p=${p.slug}`}>
                  <div className="media">
                    <img src={img1} alt={p.name} loading="lazy"/>
                    <img className="alt" src={img2} alt="" loading="lazy"/>
                    <div className="lot">Nº {String(12+i*7).padStart(3,"0")}</div>
                  </div>
                  <div className="info">
                    <div className="name">{p.name.split(" ")[0]} <em>— {p.name.split(" ")[1] || "pendant"}</em></div>
                    <div className="price">€ {p.price.toLocaleString()}</div>
                  </div>
                  <div className="specs">{PENDANT_NOTE[p.slug] || "Hand-hammered brass"}</div>
                </Reveal>
              );
            })}
          </div>
        </div>
      </section>

      <section className="note-block">
        <div className="inner">
          <Reveal className="visual" speed="reveal-slow">
            <img src="/media/products/diyae-pendant-01.webp" alt=""/>
          </Reveal>
          <div className="copy">
            <Reveal>
              <div className="eyebrow" style={{marginBottom:18}}>— Hung &amp; wired</div>
              <WordReveal as="h3" text="Wired for <em>Europe, the UK, the US.</em>" perWord={100}/>
            </Reveal>
            <Reveal delay={150}>
              <p>Each pendant ships with a 1.5 m black cotton cord, brass canopy, and an E27 socket — wired to your standard at no extra cost. Specify the country at checkout, or in a line to the atelier.</p>
              <p>Bulbs are not included. We recommend a <em>warm tungsten or 2700 K LED</em>, dimmable, 25 to 40 W equivalent.</p>
            </Reveal>
            <Reveal className="actions" delay={300}>
              <a className="btn solid" href="/commissions">Commission a pendant <span className="arrow"/></a>
              <a className="btn ghost" href="mailto:atelier@atlasperle.ma">Write to atelier</a>
            </Reveal>
          </div>
        </div>
      </section>

      <Footer />
    </LangProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
