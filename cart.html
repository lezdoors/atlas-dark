<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cart — Atlas Perle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Serif:ital,wght@1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.empty-page{padding:200px 48px 160px;background:var(--ink);text-align:center;min-height:60vh}
.empty-page .eyebrow{margin-bottom:24px;justify-content:center;display:inline-flex}
.empty-page h1{font-family:var(--f-serif);font-weight:300;font-style:italic;font-size:clamp(48px,7vw,96px);line-height:.98;color:var(--bone);margin-bottom:16px}
.empty-page h1 em{font-style:italic;color:var(--brass)}
.empty-page p{font-family:var(--f-serif);font-size:19px;color:var(--parchment);max-width:38ch;margin:0 auto 32px;line-height:1.6}
.empty-page p em{font-style:italic;color:var(--brass-hi)}
.empty-page .cta{display:inline-flex;gap:14px;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react" src="/shared.js"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <LangProvider>
      <Nav />
      <section className="empty-page">
        <div className="eyebrow">Your cart</div>
        <h1>The cart is <em>quiet.</em></h1>
        <p>Add a piece from the catalogue, or write to the atelier — <em>each commission is fixed at quotation.</em></p>
        <div className="cta">
          <a className="btn solid" href="/collection">Enter the collection <span className="arrow"/></a>
          <a className="btn ghost" href="mailto:atelier@atlasperle.ma">Write to atelier</a>
        </div>
      </section>
      <Footer />
    </LangProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
