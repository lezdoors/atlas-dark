<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Matter — Atlas Perle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Serif:ital,wght@1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.matter-hero{padding:160px 48px 80px;background:var(--night);border-bottom:1px solid var(--line)}
.matter-hero .inner{max-width:1100px;margin:0 auto}
.matter-hero h1{font-family:var(--f-serif);font-weight:300;font-size:clamp(56px,9vw,140px);line-height:.92;letter-spacing:-.02em;color:var(--bone);max-width:14ch}
.matter-hero h1 em{font-style:italic;color:var(--brass)}
.matter-hero .sub{margin-top:28px;font-family:var(--f-serif);font-style:italic;font-size:22px;color:var(--parchment);max-width:48ch;line-height:1.5}
@media(max-width:900px){.matter-hero{padding:130px 20px 50px}}
.matters{padding:80px 48px;background:var(--ink)}
.matters .inner{max-width:1440px;margin:0 auto;display:flex;flex-direction:column;gap:80px}
.mblock{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
.mblock:nth-child(even){direction:rtl}
.mblock:nth-child(even) > *{direction:ltr}
.mblock .visual{position:relative;aspect-ratio:4/5;background:var(--espresso);border:1px solid var(--line);overflow:hidden}
.mblock .visual img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(.95) brightness(.95);transform:scale(1.02)}
.mblock .visual::after{content:"";position:absolute;inset:0;background:radial-gradient(60% 50% at 50% 30%, transparent 60%, rgba(0,0,0,.45) 100%)}
.mblock .visual .lbl{position:absolute;top:24px;left:24px;z-index:2;font-family:var(--f-mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--brass);background:rgba(10,8,7,.55);padding:6px 10px;backdrop-filter:blur(4px)}
.mblock .copy{padding:0 12px}
.mblock .copy .roman{font-family:var(--f-mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--brass);margin-bottom:18px}
.mblock .copy h2{font-family:var(--f-serif);font-weight:300;font-size:clamp(36px,4.5vw,64px);line-height:1;color:var(--bone);letter-spacing:-.018em;margin-bottom:24px}
.mblock .copy h2 em{font-style:italic;color:var(--brass)}
.mblock .copy p{font-family:var(--f-serif);font-size:18px;line-height:1.7;color:var(--parchment);font-weight:300;margin-bottom:18px}
.mblock .copy p em{font-style:italic;color:var(--brass-hi)}
.mblock .copy .src{display:flex;flex-wrap:wrap;gap:0;margin-top:24px;padding-top:20px;border-top:1px solid var(--line-soft)}
.mblock .copy .src .item{flex:1;min-width:140px;padding:8px 16px 8px 0;border-right:1px solid var(--line-soft)}
.mblock .copy .src .item:last-child{border-right:0}
.mblock .copy .src .k{font-family:var(--f-mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim)}
.mblock .copy .src .v{font-family:var(--f-serif);font-style:italic;font-size:16px;color:var(--bone);margin-top:4px}
@media(max-width:900px){.matters{padding:50px 20px}.mblock{grid-template-columns:1fr;gap:24px}.mblock:nth-child(even){direction:ltr}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react" src="/shared.js"></script>

<script type="text/babel" data-presets="react">
function App() {
  const blocks = [
    {
      r:"i", title:"Cedar of <em>Azrou</em>", lbl:"Cedar · Atlas",
      img:"/media/products/moroccan-throne-chair-01.webp",
      p1:"Drawn from the Middle Atlas, our cedar is air-dried for two seasons before it ever meets a chisel. The grain runs slow and tight; under lacquer it darkens to oxblood with age.",
      p2:"We joint without metal. Mortise, tenon, peg — nothing that cannot be opened, repaired, and closed at the bench that made it.",
      src:[["Origin","Azrou, Middle Atlas"],["Drying","2 seasons, air"],["Joinery","Hand-cut mortise"]],
    },
    {
      r:"ii", title:"Brass, <em>hand-hammered</em>", lbl:"Brass · Souk Haddadine",
      img:"/media/products/kamar-pendant-01.webp",
      p1:"Sheets are perforated against a wooden stencil at Souk Haddadine, then patinated by smoke and beeswax. The brass darkens unevenly, in proportion to the hand that struck it.",
      p2:"Each pendant is a single piece. No solder, no plating; the joins are folded, the rivets walked round the seam by eye.",
      src:[["Origin","Souk Haddadine"],["Method","Hand-hammered"],["Finish","Smoke + beeswax"]],
    },
    {
      r:"iii", title:"Bone &amp; <em>mother-of-pearl</em>", lbl:"Inlay · Souk el Khemis",
      img:"/media/products/moroccan-bone-inlay-side-tables-01.webp",
      p1:"Camel bone is cut at Souk el Khemis to a tolerance of half a millimetre, then sized against the cedar grain so the catch of light runs with the seam, not against it.",
      p2:"Mother-of-pearl is sourced from the coast and bedded in a hand-mixed lacquer. A single coffee table carries between four and six hundred fragments.",
      src:[["Bone","Souk el Khemis"],["Nacre","Atlantic coast"],["Setting","Hand-mixed lacquer"]],
    },
    {
      r:"iv", title:"Hide, <em>vegetable-tanned</em>", lbl:"Hide · Tannery Chouara",
      img:"/media/products/leather-pouf-brown-01.webp",
      p1:"From the Chouara tannery, where the pits have run for nine centuries. Our hides are tanned with mimosa bark and pomegranate; the colour ripens in the dark for sixty days.",
      p2:"Each pouf is hand-stitched with waxed linen, the seams pierced with an awl and pulled through one stitch at a time. Forty-eight seams to a piece. No glue.",
      src:[["Origin","Tannery Chouara"],["Tannin","Mimosa, pomegranate"],["Stitch","Waxed linen"]],
    },
    {
      r:"v", title:"Glazed <em>terracotta</em>", lbl:"Clay · Safi & Fez",
      img:"/media/products/safi-bowl-black-white-floral-01.webp",
      p1:"Thrown by hand on the wheel at the cooperatives of Safi and Fez, where the red clay is sun-cured before firing. Each piece is fired twice — once for the body, once for the glaze drawn under the kiln's eye.",
      p2:"Decoration is painted free-hand with a single sable brush. No two are alike; small variations are the signature of the maker, not a fault.",
      src:[["Origin","Safi · Fez"],["Firing","Twice, kiln"],["Decoration","Free-hand brush"]],
    },
  ];
  return (
    <LangProvider>
      <Nav />
      <section className="matter-hero">
        <div className="inner">
          <Reveal>
            <div className="eyebrow" style={{marginBottom:24}}>III · Matter · close inspection</div>
            <WordReveal as="h1" text="The matter of <em>the catalogue.</em>" perWord={100}/>
          </Reveal>
          <Reveal className="sub" delay={300}>
            Five disciplines, five sources. Nothing arrives at Derb el Ferran that has not been touched first; nothing leaves that has not been signed.
          </Reveal>
        </div>
      </section>
      <section className="matters">
        <div className="inner">
          {blocks.map((b, i) => (
            <Reveal className="mblock" key={b.r} delay={i*80}>
              <div className="visual">
                <img src={b.img} alt=""/>
                <div className="lbl">{b.lbl}</div>
              </div>
              <div className="copy">
                <div className="roman">{b.r.toUpperCase()} · matter</div>
                <WordReveal as="h2" text={b.title} perWord={120}/>
                <p>{b.p1}</p>
                <p>{b.p2}</p>
                <div className="src">
                  {b.src.map(([k,v]) => (
                    <div className="item" key={k}>
                      <div className="k">{k}</div>
                      <div className="v">{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            </Reveal>
          ))}
        </div>
      </section>
      <Footer />
    </LangProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
