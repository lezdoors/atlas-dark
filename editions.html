<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Editions — Atlas Perle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Serif:ital,wght@1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.ed-hero{padding:160px 48px 60px;background:var(--night);border-bottom:1px solid var(--line)}
.ed-hero .inner{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end}
.ed-hero h1{font-family:var(--f-serif);font-weight:300;font-size:clamp(56px,9vw,140px);line-height:.92;letter-spacing:-.02em;color:var(--bone);max-width:14ch}
.ed-hero h1 em{font-style:italic;color:var(--brass)}
.ed-hero .sub{font-family:var(--f-serif);font-style:italic;font-size:20px;color:var(--parchment);line-height:1.55;max-width:48ch}
@media(max-width:900px){.ed-hero{padding:130px 20px 40px}.ed-hero .inner{grid-template-columns:1fr;gap:24px}}
.ed-grid{padding:80px 48px;background:var(--ink)}
.ed-grid .inner{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
@media(max-width:1000px){.ed-grid{padding:50px 20px}.ed-grid .inner{grid-template-columns:1fr 1fr;gap:14px}}
@media(max-width:600px){.ed-grid .inner{grid-template-columns:1fr}}
.etile{position:relative;aspect-ratio:3/4;overflow:hidden;border:1px solid var(--line);background:var(--espresso);display:block;color:var(--bone)}
.etile img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.78) contrast(1.1) saturate(1.05);transition:transform .8s var(--ease)}
.etile:hover img{transform:scale(1.04)}
.etile::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(10,8,7,.15) 30%, rgba(10,8,7,.92) 100%)}
.etile .body{position:absolute;inset:0;padding:24px;z-index:2;display:flex;flex-direction:column;justify-content:space-between}
.etile .top{display:flex;justify-content:space-between;align-items:flex-start}
.etile .lot{font-family:var(--f-mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--brass);background:rgba(10,8,7,.55);padding:6px 10px;backdrop-filter:blur(4px)}
.etile .stat{font-family:var(--f-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--oyster);background:rgba(10,8,7,.5);padding:6px 10px;backdrop-filter:blur(4px);text-align:right}
.etile .stat b{color:var(--brass-hi);font-weight:400}
.etile .bottom .name{font-family:var(--f-serif);font-weight:300;font-size:28px;color:var(--bone);line-height:1.05}
.etile .bottom .name em{font-style:italic;color:var(--brass-hi)}
.etile .bottom .price{font-family:var(--f-mono);font-size:11px;letter-spacing:.2em;color:var(--oyster);margin-top:8px}
.etile .big-no{position:absolute;left:24px;bottom:60px;z-index:1;font-family:var(--f-serif);font-weight:300;font-style:italic;color:var(--brass);font-size:clamp(60px,8vw,120px);line-height:.85;opacity:.85}
.note{padding:60px 48px 120px;background:var(--ink);text-align:center}
.note p{max-width:48ch;margin:0 auto;font-family:var(--f-serif);font-style:italic;font-size:20px;color:var(--parchment);line-height:1.6}
.note p em{color:var(--brass)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="/products.js"></script>
<script type="text/babel" data-presets="react" src="/shared.js"></script>

<script type="text/babel" data-presets="react">
function App() {
  // 9 curated open editions: pick first product per category at varied stops
  const featuredSlugs = [
    "moroccan-octagonal-coffee-table","moroccan-throne-chair","moroccan-painted-chest",
    "kamar-pendant","chamss-pendant","diyae-pendant",
    "leather-pouf-brown","sabra-pouf-mustard","fez-bowl-blue-green",
  ];
  const editions = featuredSlugs
    .map(s => window.PRODUCTS.find(p => p.slug === s))
    .filter(Boolean)
    .map((p, i) => ({...p, lot:`Nº ${String(38+i*7).padStart(3,"0")}`, remain: 12 - (i % 7), total: i % 2 === 0 ? 24 : 12}));
  return (
    <LangProvider>
      <Nav />
      <section className="ed-hero">
        <div className="inner">
          <Reveal>
            <div className="eyebrow" style={{marginBottom:24}}>IV · Open editions</div>
            <WordReveal as="h1" text="Still <em>circulating.</em>" perWord={100}/>
          </Reveal>
          <Reveal className="sub" delay={250}>
            Each edition is fixed at release and never extended. When numbered, it closes; what remains, remains. Below — nine pieces still circulating from Catalogue IX.
          </Reveal>
        </div>
      </section>
      <section className="ed-grid">
        <div className="inner">
          {editions.map((e, i) => (
            <Reveal as="a" className="etile" key={e.slug} delay={i*60} href={`/product?p=${e.slug}`}>
              <img src={`/media/products/${e.images[0]}`} alt={e.name}/>
              <div className="big-no">{String(e.remain).padStart(2,"0")}</div>
              <div className="body">
                <div className="top">
                  <div className="lot">{e.lot}</div>
                  <div className="stat"><b>{e.remain}</b> of {e.total}<br/>remaining</div>
                </div>
                <div className="bottom">
                  <div className="name">{e.name.split(" ")[0]} <em>— {e.name.split(" ").slice(1).join(" ") || "edition"}</em></div>
                  <div className="price">€ {e.price.toLocaleString()}</div>
                </div>
              </div>
            </Reveal>
          ))}
        </div>
      </section>
      <section className="note">
        <Reveal>
          <p>An edition closes when the last piece is signed and dispatched. <em>Re-issues are never made.</em> Should the catalogue interest you, write to the atelier — we keep a quiet list for the next release.</p>
        </Reveal>
      </section>
      <Footer />
    </LangProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
